name: Bug Report
description: Report a reproducible bug in Neige
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce it.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem
      placeholder: Neige does not mount project TODO for subagents
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Exact steps to reproduce the bug
      placeholder: |
        1. Enable the plugin
        2. Configure projectId=...
        3. Start OpenClaw
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: openclaw_version
    attributes:
      label: OpenClaw version
      placeholder: 2026.3.8
  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: 22.x / 24.x
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
