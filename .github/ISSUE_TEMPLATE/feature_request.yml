name: Feature Request
description: Propose a feature or workflow improvement
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem first, then the feature you want.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What workflow or pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like TeamBrain to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternative approach you tried
  - type: textarea
    id: scope
    attributes:
      label: Why this belongs in TeamBrain
      description: Explain why this should be part of the plugin instead of a one-off local customization
    validations:
      required: true
