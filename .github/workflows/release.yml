name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
      publish_to_npm:
        description: "Publish to npm after checks"
        required: true
        default: "false"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package version matches tag
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.tag.outputs.value }}"
          if [[ "v${PKG_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "package.json version (${PKG_VERSION}) does not match tag (${TAG_VERSION})"
            exit 1
          fi

      - name: Pack package
        run: npm pack

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          FILE=$(ls *.tgz | head -n 1)
          gh release view "${{ steps.tag.outputs.value }}" >/dev/null 2>&1 || \
            gh release create "${{ steps.tag.outputs.value }}" "$FILE" --generate-notes

      - name: Publish to npm
        if: ${{ github.event_name == 'push' || github.event.inputs.publish_to_npm == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
